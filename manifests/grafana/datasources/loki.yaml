apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki
  namespace: observability
spec:
  instanceSelector:
    matchLabels: { dashboards: grafana }
  datasource:
    name: Loki
    type: loki
    uid: loki
    url: http://loki-gateway.observability.svc.cluster.local:80
    access: proxy
    editable: false
    jsonData:
      derivedFields:
        - name: TraceID
          matcherRegex: "traceID=(\\w+)"
          url: "${__value.raw}"
          datasourceUid: tempo
      maxLines: 1000
