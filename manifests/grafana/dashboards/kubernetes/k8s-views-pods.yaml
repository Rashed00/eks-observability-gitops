apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: k8s-views-pods
  namespace: observability
spec:
  instanceSelector:
    matchLabels: { dashboards: grafana }
  folder: Kubernetes
  resyncPeriod: 5m
  grafanaCom:
    id: 15760
    revision: 28
  datasources:
    - inputName: DS_PROMETHEUS
      datasourceName: Prometheus
