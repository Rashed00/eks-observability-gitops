# Pulled from AWS Secrets Manager by External Secrets - this is the
# rendered Secret that Envoy's SecurityPolicy expects.
#
# Defined here (templated) so it has a stable name across resyncs. The actual
# secret content is materialized by the ExternalSecret in
# manifests/external-secrets/secrets/remote-write-basic-auth.yaml
#
# This placeholder file documents the shape Envoy expects. Do NOT add real
# credentials here.
apiVersion: v1
kind: Secret
metadata:
  name: basic-auth-observability
  namespace: observability
  annotations:
    # Keep ArgoCD from "fixing" the populated value back to empty.
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    argocd.argoproj.io/sync-options: Prune=false
type: Opaque
stringData:
  # Will be replaced by External Secrets with the value of
  # observability/remote-write-basic-auth#htpasswd.
  .htpasswd: "placeholder-replaced-by-external-secrets"
