apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
  namespace: observability
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  parentRefs:
    - { name: observability-gateway, namespace: observability, sectionName: http }
  hostnames:
    - "alertmanager.monitoring.example.com"
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - { name: alertmanager-operated, port: 9093 }
