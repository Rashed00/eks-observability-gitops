# Populates the basic-auth-observability Secret consumed by the Envoy
# SecurityPolicy (manifests/gateway-api/securitypolicy-basic-auth.yaml).
# The htpasswd field in Secrets Manager is bcrypt-encoded by Terraform.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: basic-auth-observability
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: basic-auth-observability
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        .htpasswd: "{{ .htpasswd }}"
  data:
    - secretKey: htpasswd
      remoteRef:
        key: observability/remote-write-basic-auth
        property: htpasswd
