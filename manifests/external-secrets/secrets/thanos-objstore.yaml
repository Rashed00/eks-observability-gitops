# Thanos / Prometheus sidecar consume the S3 objstore config via this secret.
# We don't store the bucket name in Secrets Manager (it's derivable from the
# cluster name) so this ExternalSecret only injects the rendered file body.
#
# Replace the dummy bucket name and region if needed. (Alternative: store the rendered
# objstore.yml in Secrets Manager and template here.)
apiVersion: v1
kind: ConfigMap
metadata:
  name: thanos-objstore-config-template
  namespace: observability
data:
  objstore.yml: |
    type: S3
    config:
      bucket: observability-cluster-thanos-000000000000
      endpoint: s3.eu-central-1.amazonaws.com
      region: eu-central-1
      insecure: false
---
# Wrap the ConfigMap value into a Secret because Prometheus expects the
# Thanos objstore config from a Secret (per the operator API).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: thanos-objstore-config
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: thanos-objstore-config
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        objstore.yml: |
          type: S3
          config:
            bucket: observability-cluster-thanos-000000000000
            endpoint: s3.eu-central-1.amazonaws.com
            region: eu-central-1
            insecure: false
  # No data: block - this is a "templated-only" ExternalSecret. ESO still
  # needs the ClusterSecretStore to exist to create the Secret resource.
  data: []
