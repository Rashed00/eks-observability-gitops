apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "LGTM stack: Prometheus + Thanos, Loki, Tempo, Grafana, Alloy, rules, dashboards."
  sourceRepos:
    - https://<your-org>.github.io/eks-observability-helm-charts
    - https://github.com/<your-org>/eks-observability-gitops.git
    - "*"
  destinations:
    - { namespace: "*", server: https://kubernetes.default.svc }
  clusterResourceWhitelist:
    - { group: "*", kind: "*" }
  namespaceResourceWhitelist:
    - { group: "*", kind: "*" }
